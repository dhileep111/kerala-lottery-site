kind = "web"
previewPath = "/"
title = "Kerala Ticket Results"
version = "1.0.0"
id = "artifacts/kerala-lottery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21451

[services.development]
run = "pnpm --filter @workspace/kerala-lottery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kerala-lottery", "run", "build" ]
publicDir = "artifacts/kerala-lottery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21451"
BASE_PATH = "/"
