    <!-- GitHub Pages SPA Routing Fix
         Decodes paths encoded by 404.html back into clean browser history.
         Handles BOTH conventions:
           /?/results/bhagyathara  (slash — new 404.html)
           /?p=results/bhagyathara (p-param — old 404.html, kept for backwards compat)
    -->
    <script type="text/javascript">
      (function(l) {
        var search = l.search;
        if (!search || search.length < 2) return;

        var decoded = null;

        // Convention 1: /?/results/bhagyathara  (search[1] === '/')
        if (search[1] === '/') {
          var parts = search.slice(1).split('?');
          var path  = parts[0].split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('&');
          var query = parts[1]
            ? '?' + parts[1].split('&').map(function(s) {
                return s.replace(/~and~/g, '&');
              }).join('&')
            : '';
          decoded = { path: path, query: query };
        }

        // Convention 2: /?p=results/bhagyathara  (backwards compat)
        else if (search[1] === 'p' && search[2] === '=') {
          var q = search.slice(1).split('&').reduce(function(a, v) {
            var p = v.split('=');
            a[p[0]] = p.slice(1).join('=').replace(/~and~/g, '&');
            return a;
          }, {});
          if (q.p !== undefined) {
            decoded = {
              path:  '/' + (q.p || ''),
              query: q.q ? '?' + q.q : ''
            };
          }
        }

        if (decoded) {
          window.history.replaceState(
            null, null,
            decoded.path + decoded.query + l.hash
          );
        }
      }(window.location));
    </script>

    <!-- Strip stray parentheses from legacy bad URLs (e.g. /results/bumper/br-109))
         so the clean path resolves AND the canonical below points to the clean URL. -->
    <script type="text/javascript">
      (function() {
        var p = window.location.pathname;
        var clean = p.replace(/[)(]/g, '');
        if (clean !== p) {
          window.history.replaceState(
            null, null,
            clean + window.location.search + window.location.hash
          );
        }
      })();
    </script>

    <!-- Canonical tag — always points to clean URL, never ?p= or ?/
         Updates the EXISTING canonical in place (prerendered pages already
         ship a correct one from prerender.mjs) instead of appending a
         second one — two canonical tags is exactly what makes Google
         distrust the page's signal and pick its own (e.g. the homepage)
         instead of the page itself. -->
    <script type="text/javascript">
      (function() {
        var baseUrl    = 'https://keralaticketresults.in';
        var cleanPath  = window.location.pathname;

        // If still has redirect params (edge case), extract clean path
        var search = window.location.search;
        if (search && search[1] === '/') {
          cleanPath = search.slice(1).split('?')[0];
        } else if (search && search.startsWith('?p=')) {
          var pVal = search.slice(3).split('&')[0];
          cleanPath = '/' + pVal.replace(/~and~/g, '&');
        }

        if (!cleanPath.startsWith('/')) cleanPath = '/' + cleanPath;
        // Normalize trailing slash so this never disagrees with
        // prerender.mjs's un-slashed convention (e.g. "/chart/" -> "/chart").
        if (cleanPath.length > 1 && cleanPath.endsWith('/')) {
          cleanPath = cleanPath.slice(0, -1);
        }

        var href = baseUrl + cleanPath;
        var existing = document.querySelectorAll('link[rel="canonical"]');
        if (existing.length) {
          // Keep the first, update it to the clean href; remove any duplicates.
          existing[0].href = href;
          for (var i = 1; i < existing.length; i++) existing[i].remove();
        } else {
          var link = document.createElement('link');
          link.rel  = 'canonical';
          link.href = href;
          document.head.appendChild(link);
        }
      })();
    </script>
