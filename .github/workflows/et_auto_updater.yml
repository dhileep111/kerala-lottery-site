name: 🤖 Auto-fetch Result from ET

on:
  schedule:
    # 3:45 PM IST = 10:15 UTC — ET publishes results by 3:40 PM
    - cron: '15 10 * * *'
  workflow_dispatch:
    inputs:
      force_date:
        description: 'Force a specific date (YYYY-MM-DD) for testing'
        required: false
        type: string

jobs:
  auto-scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests beautifulsoup4

      - name: Run ET scraper
        id: scraper
        run: |
          python et_scraper.py
          # Read scraper output
          if [ -f /tmp/et_first_prize.txt ] && [ -s /tmp/et_first_prize.txt ]; then
            echo "first_prize=$(cat /tmp/et_first_prize.txt)" >> $GITHUB_OUTPUT
            echo "full_results=$(cat /tmp/et_full_results.txt)" >> $GITHUB_OUTPUT
            echo "slug=$(cat /tmp/et_slug.txt)" >> $GITHUB_OUTPUT
            echo "draw_code=$(cat /tmp/et_draw_code.txt)" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✅ Scraper found result: $(cat /tmp/et_first_prize.txt)"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "⚠️ Scraper found no result — skipping deploy"
          fi

      - name: Update results.json
        if: steps.scraper.outputs.found == 'true'
        env:
          LOTTERY_PAGE:  ${{ steps.scraper.outputs.slug }}
          DRAW_CODE:     ${{ steps.scraper.outputs.draw_code }}
          FIRST_PRIZE:   ${{ steps.scraper.outputs.first_prize }}
          FULL_RESULTS:  ${{ steps.scraper.outputs.full_results }}
        run: python update_results.py

      - name: Commit data changes
        if: steps.scraper.outputs.found == 'true'
        run: |
          git config --global user.name "ET Auto Bot"
          git config --global user.email "bot@keralaticketresults.in"
          git add artifacts/kerala-lottery/src/data/results.json
          git diff --staged --quiet || (git commit -m "auto: ${{ steps.scraper.outputs.draw_code }} from ET scraper" && git push)

      - name: Setup Node
        if: steps.scraper.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        if: steps.scraper.outputs.found == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install & Build
        if: steps.scraper.outputs.found == 'true'
        working-directory: artifacts/kerala-lottery
        env:
          PORT: "3000"
          BASE_PATH: "/"
        run: pnpm install && pnpm run build

      - name: Pre-render all routes
        if: steps.scraper.outputs.found == 'true'
        run: node prerender.mjs

      - name: Generate sitemap
        if: steps.scraper.outputs.found == 'true'
        run: node generate-sitemap.mjs

      - name: Setup Pages
        if: steps.scraper.outputs.found == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.scraper.outputs.found == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/kerala-lottery/dist/public

      - name: Deploy to GitHub Pages
        if: steps.scraper.outputs.found == 'true'
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Notify Make.com
        if: steps.scraper.outputs.found == 'true'
        env:
          MAKE_WEBHOOK: ${{ secrets.MAKE_WEBHOOK_URL }}
          LOTTERY_NAME: ${{ steps.scraper.outputs.slug }}
          DRAW_CODE: ${{ steps.scraper.outputs.draw_code }}
          FIRST_PRIZE: ${{ steps.scraper.outputs.first_prize }}
          RESULT_URL: https://keralaticketresults.in/results/${{ steps.scraper.outputs.slug }}
          HAS_FULL: ${{ steps.scraper.outputs.full_results != '' }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request
          webhook = os.environ.get('MAKE_WEBHOOK','')
          if not webhook:
              exit(0)
          lottery   = os.environ.get('LOTTERY_NAME','')
          draw_code = os.environ.get('DRAW_CODE','')
          prize     = os.environ.get('FIRST_PRIZE','')
          url       = os.environ.get('RESULT_URL','')
          is_full   = os.environ.get('HAS_FULL','false').lower()=='true'
          status    = 'Verified full result' if is_full else 'Auto-fetched from ET - full result may follow'
          fb  = lottery+' '+draw_code+' Result Today\n\n1st Prize: '+prize+'\n'+status+'\n\nFull prize list: '+url
          tg  = '*'+lottery+' '+draw_code+' Result*\n\n1st Prize: '+prize+'\n'+status+'\n\n[View full prize table]('+url+')'
          payload = {'lottery':lottery,'draw_code':draw_code,'first_prize':prize,'is_full_result':is_full,'result_url':url,'fb_message':fb,'tg_message':tg}
          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(webhook,data=data,headers={'Content-Type':'application/json'})
          try:
              resp = urllib.request.urlopen(req,timeout=10)
              print('Webhook sent:', resp.status)
          except Exception as e:
              print('Webhook error:', e)
          PYEOF
