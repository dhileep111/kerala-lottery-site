name: 🚀 Update Lottery Results

on:
  schedule:
    - cron: '35 9 * * *'
  workflow_dispatch:
    inputs:
      lottery_page:
        description: 'Which lottery page to update?'
        required: true
        type: choice
        options:
          - karunya
          - karunya-plus
          - sthree-sakthi
          - dhanalekshmi
          - bhagyathara
          - samrudhi
          - suvarna-keralam
          - bumper
      draw_code:
        description: 'Draw Code (e.g., KR-753)'
        required: true
        type: string
      first_prize:
        description: '1st Prize Number (e.g., KN 844574)'
        required: true
        type: string

jobs:
  update-website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Run structured data updater
        run: python update_results.py "${{ github.event.inputs.lottery_page }}" "${{ github.event.inputs.draw_code }}" "${{ github.event.inputs.first_prize }}"
      - name: Commit and Push Changes
        run: |
          git config --global user.name "Lottery Updater Bot"
          git config --global user.email "bot@keralaticketresults.in"
          git add data/results.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update structured result data" && git push)
