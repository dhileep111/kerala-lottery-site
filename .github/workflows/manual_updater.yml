name: 🚀 Update Lottery Results

on:
  # Cron disabled — trigger manually after watching 3 PM draw
  # Re-enable when auto-scraper is ready
  # schedule:
  #   - cron: '35 9 * * *'   # 3:05 PM IST
  #   - cron: '15 11 * * *'  # 4:45 PM IST
  workflow_dispatch:
    inputs:
      first_prize:
        description: '1st Prize ticket number ONLY — e.g. KU 144057 (no JSON, no district)'
        required: true
        type: string
      full_results:
        description: 'Full FIELD 4 from converter (leave blank for 3 PM live update)'
        required: false
        type: string
      guessing_a:
        description: 'Guessing Board A (single digit)'
        required: false
        type: string
      guessing_b:
        description: 'Guessing Board B (single digit)'
        required: false
        type: string
      guessing_c:
        description: 'Guessing Board C (single digit)'
        required: false
        type: string

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install beautifulsoup4 requests

      # ── AUTO-DETECT today's lottery & draw code ─────────────
      - name: Auto-detect lottery and draw code
        id: detect
        run: |
          python3 - << 'EOF'
          import json, datetime, os

          DATA = 'artifacts/kerala-lottery/src/data'
          with open(f'{DATA}/lotteries.json') as f:
              lotteries = json.load(f)
          with open(f'{DATA}/results.json') as f:
              results = json.load(f)

          # Today's draw — JS day convention: Sun=0, Mon=1...Sat=6
          today_js = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=5, minutes=30))).weekday()
          today_js = (today_js + 1) % 7  # convert Python Mon=0 to JS Sun=0

          # Find today's lottery (skip bumper)
          today_lottery = next(
              (l for l in lotteries if l['drawDayIndex'] == today_js and not l.get('isBumper')),
              lotteries[0]
          )
          slug = today_lottery['slug']
          code_prefix = today_lottery['code']

          # Check if today already has a result — reuse that draw code
          ist_now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=5, minutes=30)))
          today_str = ist_now.strftime('%Y-%m-%d')

          today_result = next(
              (r for r in results if r['lotterySlug'] == slug and r.get('drawDate','') == today_str),
              None
          )

          if today_result:
              # Already exists for today — reuse same draw code (this is an update run)
              draw_code = today_result['drawCode']
              print(f'Reusing existing draw for today: {draw_code}')
          else:
              # New draw — increment from last completed draw
              draws = [r for r in results
                       if r['lotterySlug'] == slug
                       and '-' in r.get('drawCode','')
                       and r.get('drawDate','') != today_str]
              nums = []
              for d in draws:
                  try: nums.append(int(d['drawCode'].split('-')[1]))
                  except: pass
              next_num = max(nums) + 1 if nums else 1
              draw_code = f'{code_prefix}-{next_num}'

          print(f'Draw code: {draw_code}')

          # Write to env file
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'slug={slug}\n')
              f.write(f'draw_code={draw_code}\n')
              f.write(f'lottery_name={today_lottery["name"]}\n')

          print(f'✅ Today: {today_lottery["name"]} | Draw code: {draw_code}')
          EOF

      # ── UPDATE RESULTS ────────────────────────────────────────
      - name: Update results.json
        env:
          LOTTERY_PAGE:  ${{ steps.detect.outputs.slug }}
          DRAW_CODE:     ${{ steps.detect.outputs.draw_code }}
          FIRST_PRIZE:   ${{ github.event.inputs.first_prize }}
          FULL_RESULTS:  ${{ github.event.inputs.full_results }}
          GUESSING_A:    ${{ github.event.inputs.guessing_a }}
          GUESSING_B:    ${{ github.event.inputs.guessing_b }}
          GUESSING_C:    ${{ github.event.inputs.guessing_c }}
        run: python update_results.py

      # ── UPDATE GUESSING NUMBERS ───────────────────────────────
      - name: Update guessing numbers
        if: ${{ github.event.inputs.guessing_a != '' }}
        env:
          A: ${{ github.event.inputs.guessing_a }}
          B: ${{ github.event.inputs.guessing_b }}
          C: ${{ github.event.inputs.guessing_c }}
        run: |
          python3 - << 'EOF'
          import json, os, datetime
          path = 'artifacts/kerala-lottery/src/data/guessing-numbers.json'
          with open(path) as f:
              data = json.load(f)
          A = os.environ.get('A','').strip()
          B = os.environ.get('B','').strip()
          C = os.environ.get('C','').strip()
          if A: data['boards']['A'] = A
          if B: data['boards']['B'] = B
          if C: data['boards']['C'] = C
          today = datetime.date.today()
          data['updatedDate']  = today.strftime('%Y-%m-%d')
          data['updatedLabel'] = today.strftime('%B %-d, %Y')
          combo_map = {
            'AB Combo':A+B,'BC Combo':B+C,'CA Combo':C+A,
            'ABC Three Digit':A+B+C,'BCA Three Digit':B+C+A,'CAB Three Digit':C+A+B,
            'Hot Pick':A+A+B+C,'Mirror Pick':B+B+C+A,'Pattern Pick':C+C+A+B,
            'Lucky Combo':A+B+C+A,'Reverse Pick':C+B+A+C,'Sequential':C+B+C+A,
            'Zero Start':'0'+A+B+C,'Double AB':A+B+A+B,'Double BC':B+C+B+C,
          }
          for item in data['numbers']:
              if item['label'] in combo_map: item['value']=combo_map[item['label']]
              elif item['label']=='A Board': item['value']=A
              elif item['label']=='B Board': item['value']=B
              elif item['label']=='C Board': item['value']=C
          with open(path,'w') as f:
              json.dump(data,f,indent=2,ensure_ascii=False)
          print(f'✅ Guessing numbers: A={A} B={B} C={C}')
          EOF

      # ── COMMIT ALL DATA CHANGES ───────────────────────────────
      - name: Commit data changes
        run: |
          git config --global user.name "Lottery Bot"
          git config --global user.email "bot@keralaticketresults.in"
          git add artifacts/kerala-lottery/src/data/results.json
          git add artifacts/kerala-lottery/src/data/guessing-numbers.json
          git diff --staged --quiet || (git commit -m "data: ${{ steps.detect.outputs.draw_code }} result update" && git push)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install & Build
        working-directory: artifacts/kerala-lottery
        env:
          PORT: "3000"
          BASE_PATH: "/"
        run: pnpm install && pnpm run build

      - name: Pre-render all routes
        run: node prerender.mjs

      - name: Generate sitemap
        run: node generate-sitemap.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/kerala-lottery/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5


      # ── POST-DEPLOY: TRIGGER MAKE.COM WEBHOOK ────────────────
      - name: Notify Make.com for social posting
        if: ${{ github.event.inputs.first_prize != '' }}
        env:
          MAKE_WEBHOOK: ${{ secrets.MAKE_WEBHOOK_URL }}
          LOTTERY_NAME: ${{ steps.detect.outputs.lottery_name }}
          DRAW_CODE: ${{ steps.detect.outputs.draw_code }}
          FIRST_PRIZE: ${{ github.event.inputs.first_prize }}
          RESULT_URL: https://keralaticketresults.in/results/${{ steps.detect.outputs.slug }}
          HAS_FULL: ${{ github.event.inputs.full_results != '' }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request
          webhook   = os.environ.get('MAKE_WEBHOOK', '')
          if not webhook:
              print('No webhook configured')
              exit(0)
          lottery   = os.environ.get('LOTTERY_NAME', '')
          draw_code = os.environ.get('DRAW_CODE', '')
          prize     = os.environ.get('FIRST_PRIZE', '')
          url       = os.environ.get('RESULT_URL', '')
          is_full   = os.environ.get('HAS_FULL','false').lower() == 'true'
          status    = 'Verified full result' if is_full else 'Live update - full result at 4:30 PM'
          fb  = lottery + ' ' + draw_code + ' Result Today\n\n1st Prize: ' + prize + '\n' + status + '\n\nFull prize list: ' + url + '\n\nVerify at statelottery.kerala.gov.in'
          tg  = '*' + lottery + ' ' + draw_code + ' Result*\n\n1st Prize: ' + prize + '\n' + status + '\n\n[View full prize table](' + url + ')'
          payload = {'lottery':lottery,'draw_code':draw_code,'first_prize':prize,'is_full_result':is_full,'result_url':url,'fb_message':fb,'tg_message':tg}
          data = json.dumps(payload).encode('utf-8')
          req  = urllib.request.Request(webhook, data=data, headers={'Content-Type':'application/json'})
          try:
              resp = urllib.request.urlopen(req, timeout=10)
              print('Webhook sent:', resp.status)
          except Exception as e:
              print('Webhook error (non-fatal):', e)
          PYEOF
