name: 📄 Parse PDF Result

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'Direct URL to the official Kerala lottery PDF (from statelottery.kerala.gov.in)'
        required: true
        type: string
        placeholder: 'https://statelottery.kerala.gov.in/docs/...'

jobs:
  parse-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get install -y poppler-utils
          pip install pypdf

      - name: Download PDF
        run: |
          curl -L -o /tmp/lottery_result.pdf "${{ github.event.inputs.pdf_url }}"
          ls -la /tmp/lottery_result.pdf

      - name: Parse PDF
        run: python pdf_parser.py /tmp/lottery_result.pdf

      - name: Commit data changes
        run: |
          git config --global user.name "PDF Parser Bot"
          git config --global user.email "bot@keralaticketresults.in"
          git add artifacts/kerala-lottery/src/data/results.json
          git diff --staged --quiet || (git commit -m "data: PDF result from official source" && git push)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install & Build
        working-directory: artifacts/kerala-lottery
        env:
          PORT: "3000"
          BASE_PATH: "/"
        run: pnpm install && pnpm run build

      - name: Pre-render all routes
        run: node prerender.mjs

      - name: Generate sitemap
        run: node generate-sitemap.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/kerala-lottery/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
